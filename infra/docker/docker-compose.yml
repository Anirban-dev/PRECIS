version: '3.8'

services:
  # Redpanda: High-performance, Kafka-compatible event streaming bus
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.19
    container_name: precis-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr 0.0.0.0:28082,OUTSIDE://0.0.0.0:8082
      - --advertise-pandaproxy-addr PANDAPROXY://redpanda:28082,OUTSIDE://localhost:8082
      - --rpc-addr 0.0.0.0:33145
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "9092:9092"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  # Redpanda Console: Web UI for monitoring topics, groups, and schemas
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.3.8
    container_name: precis-redpanda-console
    entrypoint: /bin/sh
    command: -c "echo \"$$CONSOLE_CONFIG_FILE\" > /tmp/config.yml; /app/console --config.filepath=/tmp/config.yml"
    ports:
      - "8080:8080"
    environment:
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:29092"]
    depends_on:
      - redpanda

  # NATS: High-speed publish-subscribe microservices broker
  nats:
    image: nats:2.10-alpine
    container_name: precis-nats
    ports:
      - "4222:4222"   # Client port
      - "8222:8222"   # HTTP management monitoring
    command: "--http_port 8222"

  # PostgreSQL: Data store for persistent records, dispatch logs and history
  postgres:
    image: postgres:15-alpine
    container_name: precis-postgres
    environment:
      POSTGRES_DB: precis
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: supersecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redpanda_data:
  postgres_data:
