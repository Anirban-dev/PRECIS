version: '3.9'

services:

  backend:

    build:

      context: ../../

      dockerfile:
        deployment/docker/Dockerfile.backend

    ports:

      - "8000:8000"

  gateway:

    build:

      context: ../../

      dockerfile:
        deployment/docker/Dockerfile.gateway

    ports:

      - "8080:8080"

  cv_engine:

    build:

      context: ../../

      dockerfile:
        deployment/docker/Dockerfile.cv

  ai_engine:

    build:

      context: ../../

      dockerfile:
        deployment/docker/Dockerfile.ai

  postgres:

    image: postgres:15

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

      POSTGRES_DB: precis

    ports:

      - "5432:5432"

  redis:

    image: redis:7

    ports:

      - "6379:6379"

  nats:

    image: nats:latest

    ports:

      - "4222:4222"