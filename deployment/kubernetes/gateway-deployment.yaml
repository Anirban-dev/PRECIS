apiVersion: apps/v1

kind: Deployment

metadata:

  name: precis-gateway

spec:

  replicas: 2

  selector:

    matchLabels:

      app: precis-gateway

  template:

    metadata:

      labels:

        app: precis-gateway

    spec:

      containers:

        - name: gateway

          image: precis-gateway:latest

          ports:

            - containerPort: 8080