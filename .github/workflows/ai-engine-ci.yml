name: AI Engine CI

on:

  push:

    branches:
      - main

jobs:

  test-ai:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4

        with:

          python-version: "3.11"

      - run: pip install ultralytics

      - run: pytest ai_engine/tests